name: Weekly Backtest

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest
        run: python scripts/run_backtest.py SPCX
